{% extends "base.html" %}
{% block content %}
<div class="space-y-6">

  <!-- Poll interval card -->
  <div class="bg-slate-800 rounded-xl p-6 shadow-lg">
    <h2 class="text-lg font-semibold text-white mb-4">Chu kỳ poll</h2>
    <form method="post" action="/admin/interval" class="flex items-center gap-3">
      <input name="interval" type="number" min="3" value="{{ interval }}"
             class="w-28 bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <span class="text-slate-400 text-sm">giây (tối thiểu 3)</span>
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 font-medium transition-colors">Lưu</button>
    </form>
  </div>

  <!-- Email whitelist card -->
  <div class="bg-slate-800 rounded-xl p-6 shadow-lg">
    <h2 class="text-lg font-semibold text-white mb-4">Whitelist email</h2>
    <form method="post" action="/admin/email" class="flex gap-2 mb-4">
      <input name="email" type="email" placeholder="email@gmail.com" required
             class="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 font-medium transition-colors">Thêm</button>
    </form>
    {% if allowed %}
    <ul class="divide-y divide-slate-700">
      {% for e in allowed %}
      <li class="flex items-center justify-between py-2.5">
        <span class="text-slate-300 text-sm font-mono">{{ e }}</span>
        <form method="post" action="/admin/email/delete">
          <input type="hidden" name="email" value="{{ e }}">
          <button type="submit" class="text-slate-500 hover:text-red-400 text-sm transition-colors">Xóa</button>
        </form>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="text-slate-500 text-sm">Chưa có email nào trong whitelist.</p>
    {% endif %}
  </div>

</div>
{% endblock %}
